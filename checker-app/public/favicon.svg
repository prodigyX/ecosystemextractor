      <stop offset="0%" stop-color="#ff5600"/>
      <stop offset="100%" stop-color="#f64f12"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#13110e" stroke="#35271e" stroke-width="2"/>
  <polyline
